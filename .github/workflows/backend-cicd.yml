name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - 'test/#137'      
      - 'release/#test' 
  # pull_request: ... (테스트 중엔 꺼둠)

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ipiece-server

jobs:
  security-scan:
    name: Security & Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 테스트 단계는 모의 환경변수(test)만 사용 (현재 스킵 중일 경우 주석 유지)
      # - name: Run Tests
      #   run: ./gradlew test --no-daemon
      #   env: ...

  build-and-push:
    name: Build, Push, and Deploy
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ steps.image-tag.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          # -x test 옵션으로 빌드 시에도 테스트 제외
          ./gradlew clean build -x test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: image-tag
        run: |
          SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          echo "sha=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ steps.image-tag.outputs.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --cache-to type=inline \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .

      # ▼▼▼ GitHub Secrets 값을 K8s Secret으로 자동 동기화 ▼▼▼
      - name: Update Kubernetes Secret
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER: ${{ secrets.SOLAPI_SENDER }}
          ADMIN_PRIVATE_KEY: ${{ secrets.ADMIN_PRIVATE_KEY }}
          BESU_RPC_URL: ${{ secrets.BESU_RPC_URL }}
          KRWT_CONTRACT_ADDRESS: ${{ secrets.KRWT_CONTRACT_ADDRESS }}
        run: |
          echo "🔐 Syncing GitHub Secrets to EKS..."
          
          # EKS 클러스터 연결
          aws eks update-kubeconfig --region ap-northeast-2 --name ipiece-cluster1

          # 기존 시크릿 삭제 후 재생성
          kubectl delete secret ipiece-backend-env -n default --ignore-not-found
          
          # 시크릿 생성
          kubectl create secret generic ipiece-backend-env -n default \
            --from-literal=DB_HOST="$DB_HOST" \
            --from-literal=DB_PORT="$DB_PORT" \
            --from-literal=DB_NAME="$DB_NAME" \
            --from-literal=DB_USER="$DB_USER" \
            --from-literal=DB_PASS="$DB_PASS" \
            --from-literal=REDIS_HOST="$REDIS_HOST" \
            --from-literal=REDIS_PORT="$REDIS_PORT" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=SOLAPI_API_KEY="$SOLAPI_API_KEY" \
            --from-literal=SOLAPI_API_SECRET="$SOLAPI_API_SECRET" \
            --from-literal=SOLAPI_SENDER="$SOLAPI_SENDER" \
            --from-literal=ADMIN_PRIVATE_KEY="$ADMIN_PRIVATE_KEY" \
            --from-literal=BESU_RPC_URL="$BESU_RPC_URL" \
            --from-literal=KRWT_CONTRACT_ADDRESS="$KRWT_CONTRACT_ADDRESS"
            
          echo "✅ Kubernetes Secret updated successfully."

      # ▼▼▼ [핵심] Manifest Repo 업데이트 (특정 브랜치 매핑 로직 수정) ▼▼▼
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update manifests repo
        env:
          GIT_TOKEN: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          SHA_TAG: ${{ steps.image-tag.outputs.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # 1. 오버레이 경로 결정 (테스트 브랜치 매핑 추가)
          if [[ "$BRANCH_NAME" == "main" ]]; then
            OVERLAY="prod"
          elif [[ "$BRANCH_NAME" == "develop" ]]; then
            OVERLAY="dev"
          # ✅ [수정됨] test/#137 브랜치는 Dev 환경으로 배포
          elif [[ "$BRANCH_NAME" == "test/#137" ]]; then
            OVERLAY="dev"
            echo "🧪 Testing Branch detected: Deploying to DEV environment."
          # ✅ [수정됨] release/#test 브랜치는 Prod 환경으로 배포
          elif [[ "$BRANCH_NAME" == "release/#test" ]]; then
            OVERLAY="prod"
            echo "🚀 Release Test Branch detected: Deploying to PROD environment."
          # 기존 릴리즈 패턴
          elif [[ "$BRANCH_NAME" == release/* ]]; then
            OVERLAY="prod"
          else
            echo "⚠️ Skipping manifest update for branch: $BRANCH_NAME"
            exit 0
          fi

          echo "🔨 Updating manifests for $OVERLAY..."

          # 2. Git 설정 및 클론
          TRIMMED_TOKEN=$(echo "$GIT_TOKEN" | tr -d '\n' | tr -d '\r')
          git config --global user.email "ci@ipiece.local"
          git config --global user.name "ipiece-ci"
          git config --global credential.helper store
          echo "https://x-access-token:${TRIMMED_TOKEN}@github.com" > ~/.git-credentials

          git clone -b develop https://github.com/Woori-FISA-Go/ipiece-manifests.git
          
          # 3. 해당 오버레이 폴더로 이동
          cd ipiece-manifests/apps/backend/overlays/$OVERLAY

          # 4. Kustomize로 이미지 태그 변경
          kustomize edit set image $ECR_REGISTRY/$ECR_REPOSITORY=$ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG

          # 5. 변경사항 커밋 및 푸시
          cd ../../../..
          if git diff --quiet; then
            echo "⭕ No changes to commit."
          else
            git add .
            git commit -m "chore(backend): update image tag to ${SHA_TAG} for ${OVERLAY} (from ${BRANCH_NAME})"
            git push origin develop
            echo "✅ Manifest updated and pushed."
          fi
