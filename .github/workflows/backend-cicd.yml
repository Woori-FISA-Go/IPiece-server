name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - 'release/**'     # 릴리즈 브랜치
      - 'develop'        # 개발 브랜치
    # ✅ README(.md) 등 문서만 수정된 커밋은 파이프라인 실행 안 함
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ipiece-server

jobs:
  security-scan:
    name: Security & Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

  build-and-push:
    name: Build, Push, and Deploy
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ steps.image-tag.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔥 실행마다 유니크한 태그 생성 (short SHA + run_number)
      - name: Generate image tags
        id: image-tag
        run: |
          SHA_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          RUN_TAG="${SHA_SHORT}-${GITHUB_RUN_NUMBER}"
          echo "Using image tag: $RUN_TAG"
          echo "sha=$RUN_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ steps.image-tag.outputs.sha }}
        run: |
          echo "🚀 Building & pushing image: $ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG"

          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --cache-to type=inline \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .

      # ▼▼▼ [동일: K8s Secret 동기화] ▼▼▼
      - name: Update Kubernetes Secret
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER: ${{ secrets.SOLAPI_SENDER }}
          ADMIN_PRIVATE_KEY: ${{ secrets.ADMIN_PRIVATE_KEY }}
          BESU_RPC_URL: ${{ secrets.BESU_RPC_URL }}
          KRWT_CONTRACT_ADDRESS: ${{ secrets.KRWT_CONTRACT_ADDRESS }}
        run: |
          echo "🔐 Syncing GitHub Secrets to EKS..."
          
          aws eks update-kubeconfig --region ap-northeast-2 --name ipiece-cluster1

          kubectl delete secret ipiece-backend-env -n default --ignore-not-found
          
          kubectl create secret generic ipiece-backend-env -n default \
            --from-literal=DB_HOST="$DB_HOST" \
            --from-literal=DB_PORT="$DB_PORT" \
            --from-literal=DB_NAME="$DB_NAME" \
            --from-literal=DB_USER="$DB_USER" \
            --from-literal=DB_PASS="$DB_PASS" \
            --from-literal=REDIS_HOST="$REDIS_HOST" \
            --from-literal=REDIS_PORT="$REDIS_PORT" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=SOLAPI_API_KEY="$SOLAPI_API_KEY" \
            --from-literal=SOLAPI_API_SECRET="$SOLAPI_API_SECRET" \
            --from-literal=SOLAPI_SENDER="$SOLAPI_SENDER" \
            --from-literal=ADMIN_PRIVATE_KEY="$ADMIN_PRIVATE_KEY" \
            --from-literal=BESU_RPC_URL="$BESU_RPC_URL" \
            --from-literal=KRWT_CONTRACT_ADDRESS="$KRWT_CONTRACT_ADDRESS"
            
          echo "✅ Kubernetes Secret updated successfully."

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update manifests repo
        env:
          GIT_TOKEN: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          SHA_TAG: ${{ steps.image-tag.outputs.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          OVERLAY="prod"
          echo "🚀 Unified Pipeline: Deploying branch '${BRANCH_NAME}' to PROD environment with image tag '${SHA_TAG}'."

          TRIMMED_TOKEN=$(echo "$GIT_TOKEN" | tr -d '\n' | tr -d '\r')
          git config --global user.email "ci@ipiece.local"
          git config --global user.name "ipiece-ci"
          git config --global credential.helper store
          echo "https://x-access-token:${TRIMMED_TOKEN}@github.com" > ~/.git-credentials

          git clone -b develop https://github.com/Woori-FISA-Go/ipiece-manifests.git
          
          cd ipiece-manifests/apps/backend/overlays/$OVERLAY

          echo "Before image:"
          grep -i "$ECR_REPOSITORY" kustomization.yaml || true

          # 이미지 태그 갱신
          kustomize edit set image $ECR_REGISTRY/$ECR_REPOSITORY=$ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG

          echo "After image:"
          grep -i "$ECR_REPOSITORY" kustomization.yaml || true

          cd ../../../..
          if git diff --quiet; then
            echo "⭕ No changes to commit."
          else
            git add .
            git commit -m "chore(backend): update image tag to ${SHA_TAG} for ${OVERLAY} (from ${BRANCH_NAME})"
            git push origin develop
            echo "✅ Manifest updated and pushed."
          fi

  notify:
    name: Notify CI/CD result to Slack (Backend)
    runs-on: ubuntu-latest
    needs:
      - security-scan
      - build-and-push
    # 🔔 성공/실패/취소 모두 알림
    if: ${{ always() }}
    steps:
      - name: Send Slack notification
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SECURITY_STATUS: ${{ needs.security-scan.result }}
          BUILD_STATUS: ${{ needs.build-and-push.result }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          echo "Security Job: $SECURITY_STATUS, Build Job: $BUILD_STATUS"

          # 전체 파이프라인 상태 계산
          if [ "$SECURITY_STATUS" = "success" ] && [ "$BUILD_STATUS" = "success" ]; then
            PIPELINE_STATUS="success"
            COLOR="good"
          elif [ "$SECURITY_STATUS" = "cancelled" ] || [ "$BUILD_STATUS" = "cancelled" ]; then
            PIPELINE_STATUS="cancelled"
            COLOR="#AAAAAA"
          else
            PIPELINE_STATUS="failure"
            COLOR="danger"
          fi

          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="(build failed or skipped)"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "text": "[BACKEND] IPiece PROD CI/CD 결과: *$PIPELINE_STATUS*",
            "attachments": [
              {
                "color": "$COLOR",
                "fields": [
                  {
                    "title": "레포지토리",
                    "value": "${{ github.repository }}",
                    "short": true
                  },
                  {
                    "title": "브랜치",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "이미지 태그",
                    "value": "$IMAGE_TAG",
                    "short": true
                  },
                  {
                    "title": "Security Scan",
                    "value": "$SECURITY_STATUS",
                    "short": true
                  },
                  {
                    "title": "Build / Deploy",
                    "value": "$BUILD_STATUS",
                    "short": true
                  },
                  {
                    "title": "실행자",
                    "value": "${{ github.actor }}",
                    "short": true
                  },
                  {
                    "title": "GitHub Actions 링크",
                    "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "short": false
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK_URL"
