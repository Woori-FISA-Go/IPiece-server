spring:
  application:
    name: IPiece
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB


  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true  # (Spring Boot 3.1+) SQL 색상 강조
        jdbc:
          time_zone: Asia/Seoul
    show-sql: true        # SQL 쿼리 출력

  jackson:
    time-zone: Asia/Seoul


server:
  error:
    include-message: always
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: prometheus, metrics, health, info

  observations:
    enable:
      http: true

  metrics:
    tags:
      k8s_node_name: "${KUBERNETES_NODE_NAME}"
    distribution:
      percentiles-histogram:
        http.server.requests: true
    enable:
      http: true
      jvm: true
      process: true
      system: true

  otlp:
    metrics:
      export:
        enabled: true
        step: 5s
        url: http://ipiece-monitoring-otel-collector-gateway.monitoring.svc.cluster.local:4318/v1/metrics
        #resource-attributes:
          #service.name: IPiece
          #service.namespace: default
          #"k8s_node_name": "${KUBERNETES_NODE_NAME}"



jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 241920000          # AccessToken 28일 -> 개발 완료 후 조정 필요
  refresh-expiration-ms: 604800000 # RefreshToken 7일

krwt:
  contract:
    address: ${KRWT_CONTRACT_ADDRESS}
tokenfactory:
  contract:
    address: ${TOKENFACTORY_CONTRACT_ADDRESS}

cors:
  allowed-origins: "http://localhost:3000, http://ipiece.store, https://ipiece.store"

  solapi:
    api-key: ${SOLAPI_API_KEY}
    api-secret: ${SOLAPI_API_SECRET}
    sender: ${SOLAPI_SENDER}

besu:
  rpc-url: ${BESU_RPC_URL}
  chain-id: ${BLOCKCHAIN_CHAIN_ID}
  tx:
    gas-price: 0
    gas-limit: 1000000
admin:
  private-key: ${ADMIN_PRIVATE_KEY}
  address: ${BLOCKCHAIN_ADMIN_ADDRESS}
blockchain:
  admin:
    user-id: 4

springdoc:
  override-with-generic-response: false
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    enabled: true

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    s3:
      bucket: ipiece-image
    region:
      static: ap-northeast-2
    stack:
      auto: false
