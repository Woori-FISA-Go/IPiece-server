blockchain:
  enabled: true
  admin:
    user-id: 4


spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: IPiece
  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://192.168.0.122:5432/ipiece
    driverClassName: org.postgresql.Driver
    username: postgres
    password: root

  data:
    redis:
      host: 192.168.0.122
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    show-sql: true

server:
  error:
    include-message: always
    include-stacktrace: never
    include-binding-errors: never

